<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bingo - Parabéns!</title>
  <link rel="stylesheet" href="css/parabens.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="img/favicon.png" type="image/png" />
</head>
<body class="parabens">
  <h1 class="titulo">Bingo! Você e mais 23 pessoas ajudaram o planeta hoje.</h1>

  <main class="conteudo">
    <div class="imagem-planeta">
      <img src="img/planeta.png" alt="Planeta Terra">
    </div>

    <div class="painel-resultados">
      <div class="card azul">
        <h3>TOTAL DE BINS:</h3>
        <div class="valor">
          <span>20</span>
          <img src="img/bin.png" alt="Ícone Bin">
        </div>
      </div>

      <div class="card roxo">
        <h3>SEQUÊNCIA DE BINGOS</h3>
        <div class="valor">
          <span>1</span>
          <img src="img/bingos-ativado.png" alt="Ícone Bingo">
        </div>
      </div>

      <div class="card amarelo">
        <h3>XP PARA SEU NÍVEL</h3>
        <div class="valor">
          <span>90</span>
          <img src="img/xp.png" alt="Ícone XP">
        </div>
      </div>
    </div>
  </main>

  <a href="dashboard.html" class="btn-voltar">VOLTAR</a>
</body>
</html>
