<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bingo - Perfil</title>
  <link rel="stylesheet" href="css/perfil.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="img/favicon.png" type="image/png" />
</head>
<body class="dashboard">
  <aside class="menu-lateral">
    <div class="logo">
      <img src="img/logo.png" alt="Logo BinGo" />
    </div>
    <nav>
      <a href="dashboard.html">MENU</a>
      <a href="ranking.html">RAKING</a>
      <a href="missoes.html">MISSÕES</a>
      <a href="loja.html">LOJA</a>
      <a href="#" class="ativo">PERFIL</a>
    </nav>
  </aside>

  <main class="painel-geral">
    <section class="painel-central">
      <div class="perfil-topo">
        <div class="avatar">
          <img src="img/usuario.png" alt="Avatar do usuário" />
        </div>
        <h1>Marco Caparra</h1>
        <p class="usuario">@caparravn</p>
        <hr class="divisoria" />
      </div>

      <section class="estatisticas">
        <h2>Estatísticas</h2>
        <div class="cards-estatisticas">
          <div class="card estatistica roxo">
            <p>Sequência de bingos...</p>
            <div class="valor">
              <span>0</span>
              <img src="img/bingos-ativado.png" alt="Bingo Icon">
            </div>
          </div>

          <div class="card estatistica amarelo">
            <p>Você possui...</p>
            <div class="valor">
              <span>0 XP</span>
              <img src="img/xp.png" alt="XP Icon">
            </div>
          </div>

          <div class="card estatistica azul">
            <p>No momento,<br>você tem...</p>
            <div class="valor">
              <span>500 Bins</span>
              <img src="img/bin.png" alt="Bins Icon">
            </div>
          </div>

          <div class="card estatistica cinza">
            <p>Você está<br>no nível...</p>
            <div class="valor">
              <span>Ninja do Lixo</span>
              <img src="img/espada.png" alt="Espada Icon">
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
